<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Fala Kids — Kit Completo de Alfabetização Infantil</title>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Caveat+Brush&family=Nunito:wght@400;500;700;800;900&family=Fredoka:wght@500;600;700&family=Patrick+Hand&display=swap" rel="stylesheet" />

  <!-- Styles -->
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div id="root"></div>

  <!-- React and Babel from CDN -->
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <!-- Scripts -->
  <script type="text/babel" src="js/app.js"></script>

  <!-- Debug Info -->
  <script>
    console.log('✓ React loaded:', typeof React !== 'undefined');
    console.log('✓ ReactDOM loaded:', typeof ReactDOM !== 'undefined');
    console.log('✓ Babel loaded:', typeof Babel !== 'undefined');
    window.addEventListener('error', (e) => {
      console.error('❌ Error:', e.message, e.filename, e.lineno);
    });
  </script>
</body>
</html>
